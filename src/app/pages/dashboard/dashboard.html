<div class="dashboard-layout">
  
  <aside class="sidebar-menu">
    <div class="group-info-header" *ngIf="!cargando && grupoData">
      <div class="avatar-circle">
        {{ grupoData.nombre.substring(0, 2) | uppercase }}
      </div>
      <div class="name-container">
        <span class="group-name">{{ grupoData.nombre }}</span>
        <span class="status-badge">Proyecto Activo</span>
      </div>
    </div>

    <div class="menu-items flex-1">
      <a *ngFor="let item of items" 
         [routerLink]="['/dashboard', groupId, item.routerLink]" 
         routerLinkActive="active-link"
         class="menu-item">
        <i [class]="item.icon"></i>
        <span>{{ item.label }}</span>
      </a>
    </div>

    <div class="sidebar-footer" *ngIf="canAddTicket">
      <button class="quick-add-btn" (click)="quickTicket()">
        <i class="pi pi-plus-circle"></i>
        <span>Ir a Tickets</span>
      </button>
    </div>
  </aside>

  <main class="dashboard-content">
    <div *ngIf="cargando" class="flex justify-content-center align-items-center h-full">
      <p-progressSpinner strokeWidth="4" />
    </div>

    <div *ngIf="!cargando" class="fade-in">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
