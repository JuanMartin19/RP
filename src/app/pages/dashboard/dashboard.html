<div class="p-4">

  <div class="flex justify-content-between align-items-center mb-4">

    <h2>Dashboard del Grupo: {{ groupId }}</h2>

    <p-button
      *ngIf="canAddticket"
      routerLink="/ticket"
      label="Crear Ticket"
      icon="pi pi-plus">
    </p-button>

  </div>

  <p-tabs value="resumen">

    <p-tablist>

      <p-tab value="resumen" routerLink="resumen">
        Resumen
      </p-tab>

      <p-tab value="kanban" routerLink="kanban">
        Tablero Kanban
      </p-tab>

      <p-tab value="lista" routerLink="lista">
        Vista de Lista
      </p-tab>

      <p-tab value="gestion" routerLink="gestion">
        Gestión - Grupo
      </p-tab>

    </p-tablist>

  </p-tabs>

  <div class="mt-4">
    <router-outlet></router-outlet>
  </div>

</div>
