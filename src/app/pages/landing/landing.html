<div class="min-h-screen bg-gray-100 flex flex-col">

    <p-menubar>
        <ng-template pTemplate="start">
            <h2 class="font-bold text-xl">Mi App</h2>
        </ng-template>

        <ng-template pTemplate="end">
            <button pButton label="Login" routerLink="/login" class="mr-2"></button>
            <button pButton label="Register" severity="success" routerLink="/register"></button>
        </ng-template>
    </p-menubar>

    <div class="flex-1 flex flex-col items-center justify-center text-center">
        <h1 class="text-5xl font-bold mb-4">Bienvenido</h1>
        <p class="text-gray-600 mb-6">Sistema con Angular 20 + PrimeNG</p>

        <button pButton label="Comenzar" routerLink="/login" icon="pi pi-arrow-right"></button>
    </div>

</div>
