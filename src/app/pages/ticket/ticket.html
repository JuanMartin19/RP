<div class="p-4 w-full">
  <p-toast></p-toast>

  <div class="surface-card p-4 border-round shadow-2 main-card">

    <div class="flex justify-content-between align-items-center mb-5">
      <h2 class="m-0 text-white text-2xl font-bold">Tickets del Grupo #{{ groupId }}</h2>
      
      <p-button
        *ngIf="canAdd"
        label="Nuevo Ticket"
        icon="pi pi-plus"
        styleClass="custom-blue-btn"
        (click)="openNew()">
      </p-button>
    </div>

    <p-table
      *ngIf="canView"
      [value]="tickets"
      [paginator]="true"
      [rows]="10"
      [loading]="cargando"
      styleClass="custom-table"
      [rowHover]="true">

      <ng-template pTemplate="header">
        <tr>
          <th>Título</th>
          <th>Estado</th>
          <th>Prioridad</th>
          <th>Creado por</th>
          <th style="width:140px">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-ticket>
        <tr>
          <td class="font-bold text-white">{{ticket.titulo}}</td>
          <td>
            <p-tag [value]="ticket.estado" [severity]="getEstadoSeverity(ticket.estado)"></p-tag>
          </td>
          <td>
            <p-tag [value]="ticket.prioridad" [severity]="getPrioridadSeverity(ticket.prioridad)"></p-tag>
          </td>
          <td class="text-400">{{ticket.autor?.nombre_completo || 'Sistema'}}</td>
          <td>
            <div class="flex gap-2">
              <button *ngIf="canEdit" pButton icon="pi pi-pencil" 
                class="p-button-rounded p-button-outlined action-btn edit-btn" 
                (click)="editTicket(ticket)"></button>
              
              <button *ngIf="canDelete" pButton icon="pi pi-trash" 
                class="p-button-rounded p-button-outlined action-btn delete-btn" 
                (click)="deleteTicket(ticket.id)"></button>
            </div>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="5" class="text-center p-4 text-500">No hay tickets registrados en este grupo</td>
        </tr>
      </ng-template>

    </p-table>

  </div>
</div>

<p-dialog
  [(visible)]="ticketDialog"
  [header]="editingId ? 'Editar Ticket' : 'Crear Nuevo Ticket'"
  [modal]="true"
  [style]="{width:'450px'}"
  [draggable]="false"
  [resizable]="false"
  styleClass="custom-dialog">

  <form [formGroup]="ticketForm" class="flex flex-column gap-3 mt-3">

    <div class="field-group">
      <label class="font-semibold block mb-2 text-sm text-gray-300">Título del Ticket *</label>
      <input pInputText formControlName="titulo" class="w-full custom-input" placeholder="Ej: Error en servidor" />
    </div>

    <div class="field-group">
      <label class="font-semibold block mb-2 text-sm text-gray-300">Descripción</label>
      <textarea pInputTextarea rows="3" formControlName="descripcion" class="w-full custom-input" placeholder="Detalles de la falla..."></textarea>
    </div>

    <div class="flex gap-3 w-full">
      <div class="field-group flex-1">
        <label class="font-semibold block mb-2 text-sm text-gray-300">Prioridad</label>
        <p-select [options]="['Alta','Media','Baja']" formControlName="prioridad" appendTo="body" styleClass="w-full custom-input"></p-select>
      </div>
    </div>

    <div class="field-group">
      <label class="font-semibold block mb-2 text-sm text-gray-300">Autor</label>
      <div class="p-inputgroup custom-input-group">
        <span class="p-inputgroup-addon bg-transparent border-none text-gray-400 pl-3">
          <i class="pi pi-user"></i>
        </span>
        <input pInputText formControlName="autor" class="custom-input border-none w-full" />
      </div>
    </div>

  </form>

  <ng-template pTemplate="footer">
    <div class="flex justify-content-end gap-3 mt-4 align-items-center">
      <p-button label="Cancelar" icon="pi pi-times" [text]="true" severity="secondary" (click)="ticketDialog=false"></p-button>
      <p-button [label]="editingId ? 'Guardar Cambios' : 'Crear Ticket'" icon="pi pi-check" styleClass="custom-blue-btn" (click)="saveTicket()"></p-button>
    </div>
  </ng-template>

</p-dialog>
