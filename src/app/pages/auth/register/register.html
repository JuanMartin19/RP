<div class="register-layout">
  
  <p-card styleClass="register-card shadow-8">
    <ng-template pTemplate="header">
      <div class="card-header">
        <p-button icon="pi pi-arrow-left" label="Volver" severity="secondary" 
                  [text]="true" routerLink="/login" class="back-btn" />
        <div class="logo-container">
          <i class="pi pi-ticket text-primary text-4xl"></i>
          <h1 class="title">Crear Cuenta</h1>
          <p class="subtitle">Únete al sistema de gestión ERP</p>
        </div>
      </div>
    </ng-template>

    <form [formGroup]="registerForm" class="flex flex-column gap-4 pt-2" (submit)="$event.preventDefault()">
      
      <p-message *ngIf="mensaje" [severity]="tipoMensaje || 'info'" [text]="mensaje" styleClass="w-full" />

      <div class="grid">
        <div class="col-12 md:col-6 flex flex-column gap-1">
          <p-floatLabel variant="on">
            <input pInputText id="nombre" class="w-full custom-input" formControlName="nombre" />
            <label for="nombre">Nombre completo *</label>
          </p-floatLabel>
          <small class="error-text" *ngIf="campoInvalido('nombre')">El nombre es obligatorio.</small>
        </div>

        <div class="col-12 md:col-6 flex flex-column gap-1">
          <p-floatLabel variant="on">
            <input pInputText id="usuario" class="w-full custom-input" formControlName="usuario" />
            <label for="usuario">Nombre de usuario *</label>
          </p-floatLabel>
          <small class="error-text" *ngIf="campoInvalido('usuario')">Mínimo 4 caracteres.</small>
        </div>
      </div>

      <div class="grid">
        <div class="col-12 md:col-6 flex flex-column gap-1">
          <p-floatLabel variant="on">
            <input pInputText id="email" class="w-full custom-input" formControlName="email" />
            <label for="email">Correo electrónico *</label>
          </p-floatLabel>
          <small class="error-text" *ngIf="campoInvalido('email')">Ingresa un correo válido.</small>
        </div>

        <div class="col-12 md:col-6 flex flex-column gap-1">
          <p-floatLabel variant="on">
            <input pInputText id="telefono" class="w-full custom-input" maxlength="10" 
                   formControlName="telefono" (input)="limitarTelefono($event)" />
            <label for="telefono">Teléfono (opcional)</label>
          </p-floatLabel>
          <small class="error-text" *ngIf="campoInvalido('telefono')">El teléfono debe tener 10 dígitos.</small>
        </div>
      </div>

      <div class="grid">
        <div class="col-12 md:col-6 flex flex-column gap-1">
          <p-floatLabel variant="on">
            <p-password id="password" styleClass="w-full" inputStyleClass="w-full custom-input"
                        [toggleMask]="true" [feedback]="true" formControlName="password" />
            <label for="password">Contraseña *</label>
          </p-floatLabel>
          <small class="error-text" *ngIf="campoInvalido('password')">Mínimo 6 caracteres.</small>
        </div>

        <div class="col-12 md:col-6 flex flex-column gap-1">
          <p-floatLabel variant="on">
            <p-password id="confirmPassword" styleClass="w-full" inputStyleClass="w-full custom-input"
                        [toggleMask]="true" [feedback]="false" formControlName="confirmPassword" />
            <label for="confirmPassword">Confirmar contraseña *</label>
          </p-floatLabel>
          <small class="error-text" *ngIf="campo('confirmPassword')?.touched && campo('password')?.value !== campo('confirmPassword')?.value">
            Las contraseñas no coinciden.
          </small>
        </div>
      </div>

      <div class="grid">
        <div class="col-12 md:col-8 flex flex-column gap-1">
          <p-floatLabel variant="on">
            <input pInputText id="direccion" class="w-full custom-input" formControlName="direccion" />
            <label for="direccion">Dirección completa (opcional)</label>
          </p-floatLabel>
        </div>

        <div class="col-12 md:col-4 flex flex-column gap-1">
          <p-datepicker styleClass="w-full custom-input date-picker-custom" 
                        formControlName="nacimiento" appendTo="body" 
                        [maxDate]="fechaMaxNacimiento" placeholder="Nacimiento *" />
          
          <small class="error-text" *ngIf="campo('nacimiento')?.touched && campo('nacimiento')?.hasError('required')">Requerido.</small>
          <small class="error-text" *ngIf="campo('nacimiento')?.touched && campo('nacimiento')?.hasError('menorDeEdad')">Debes ser +18.</small>
        </div>
      </div>

      <div class="mt-4 flex flex-column align-items-center gap-3">
        <p-button label="Registrarse" icon="pi pi-check" styleClass="submit-btn" 
                  [loading]="cargando" (click)="registrar()" />
        
        <p class="login-link">
          ¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a>
        </p>
      </div>

    </form>
  </p-card>
</div>
