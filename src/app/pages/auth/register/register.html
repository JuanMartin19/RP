<div class="min-h-screen flex justify-center items-center bg-gray-100">

    <p-card header="Crear Cuenta" class="w-96">

        <form class="flex flex-col gap-3" (submit)="$event.preventDefault()">

            <span class="p-float-label">
                <label for="usuario">Usuario</label>
                <input pInputText id="usuario"
                    (input)="usuario.set($any($event.target).value)" />
            </span>

            <span class="p-float-label">
                <label for="email">Correo</label>
                <input pInputText id="email"
                    (input)="email.set($any($event.target).value)" />
            </span>

            <span class="p-float-label">
                <label for="password">Contraseña</label>
                <input pPassword id="password" toggleMask="true"
                    (input)="password.set($any($event.target).value)" />
            </span>

            <span class="p-float-label">
                <label for="confirmPassword">Confirmar contraseña</label>
                <input pPassword id="confirmPassword" toggleMask="true"
                    (input)="confirmPassword.set($any($event.target).value)" />
            </span>

            <span class="p-float-label">
                <label for="nombre">Nombre completo</label>
                <input pInputText id="nombre"
                    (input)="nombre.set($any($event.target).value)" />
            </span>

            <span class="p-float-label">
                <label for="direccion">Dirección</label>
                <input pInputText id="direccion"
                    (input)="direccion.set($any($event.target).value)" />
            </span>

            <span class="p-float-label">
                <label for="telefono">Teléfono</label>
                <input pInputText id="telefono"
                    (input)="telefono.set($any($event.target).value)" />
            </span>

            <label>Fecha de nacimiento</label>
            <input type="date"
                (change)="nacimiento.set($any($event.target).value)" />
            <br>
            <button pButton label="Registrarse" severity="success"
                class="mt-2"
                (click)="registrar()"></button>

            <!-- Mensaje UX -->
            <p-message *ngIf="mensaje()" 
                [severity]="tipoMensaje() || 'info'" 
                [text]="mensaje()">
            </p-message>

            <div class="text-center mt-3">
                <a routerLink="/login" class="text-blue-500">Ya tengo cuenta</a>
            </div>

        </form>

    </p-card>

</div>
