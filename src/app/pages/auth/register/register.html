<div class="flex justify-content-center align-items-center min-h-screen p-4">
    <p-card styleClass="w-full max-w-30rem">
        <ng-template pTemplate="header">
            <div class="p-4 pb-0"><h2 class="text-2xl font-bold m-0 text-surface-0">Crear Cuenta</h2></div>
        </ng-template>

        <form [formGroup]="registerForm" class="flex flex-column gap-4 pt-3">

            <p-floatLabel variant="on">
                <input pInputText id="usuario" class="w-full" formControlName="usuario" />
                <label for="usuario">Usuario</label>
            </p-floatLabel>

            <p-floatLabel variant="on">
                <input pInputText id="email" class="w-full" formControlName="email" />
                <label for="email">Correo</label>
            </p-floatLabel>

            <p-floatLabel variant="on">
                <p-password id="password" styleClass="w-full" inputStyleClass="w-full" [toggleMask]="true" [feedback]="true" formControlName="password">
                </p-password>
                <label for="password">Contraseña</label>
            </p-floatLabel>

            <p-floatLabel variant="on">
                <p-password id="confirmPassword" styleClass="w-full" inputStyleClass="w-full" [toggleMask]="true" [feedback]="false" formControlName="confirmPassword">
                </p-password>
                <label for="confirmPassword">Confirmar contraseña</label>
            </p-floatLabel>

            <p-floatLabel variant="on">
                <input pInputText id="nombre" class="w-full" formControlName="nombre" />
                <label for="nombre">Nombre completo</label>
            </p-floatLabel>

            <p-floatLabel variant="on">
                <input pInputText id="direccion" class="w-full" formControlName="direccion" />
                <label for="direccion">Dirección</label>
            </p-floatLabel>

            <p-floatLabel variant="on">
                <input pInputText id="telefono" class="w-full" maxlength="10" 
                       formControlName="telefono" (input)="limitarTelefono($event)" />
                <label for="telefono">Teléfono</label>
            </p-floatLabel>

            <div class="flex flex-column gap-2">
                <label class="text-sm text-surface-400">Fecha de nacimiento</label>
                <p-datepicker styleClass="w-full" [showIcon]="true" formControlName="nacimiento" />
            </div>

            <p-button label="Registrarse" severity="success" class="w-full" (click)="registrar()" />
            <p-message *ngIf="mensaje" [severity]="tipoMensaje === 'error' ? 'error' : 'success'" [text]="mensaje" />

            <div class="text-center">
                <a routerLink="/login" class="text-primary no-underline font-medium hover:underline">Ya tengo cuenta</a>
            </div>
        </form>
    </p-card>
</div>
