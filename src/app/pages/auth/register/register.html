<div class="min-h-screen flex justify-center items-center bg-gray-100">

    <p-card header="Crear Cuenta" class="w-96">

        <form class="flex flex-col gap-3">

            <span class="p-float-label">
                <input pInputText id="name" />
                <label for="name">Nombre</label>
            </span>

            <span class="p-float-label">
                <input pInputText id="email" />
                <label for="email">Correo</label>
            </span>

            <span class="p-float-label">
                <input pPassword id="password" toggleMask="true" />
                <label for="password">Contraseña</label>
            </span>

            <button pButton label="Registrarse" severity="success" class="mt-2"></button>

            <div class="text-center mt-3">
                <a routerLink="/login" class="text-blue-500">Ya tengo cuenta</a>
            </div>

        </form>

    </p-card>

</div>
