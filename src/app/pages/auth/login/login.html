<div class="min-h-screen flex justify-center items-center bg-gray-100">

    <p-card header="Iniciar Sesión" class="w-96">

        <div class="mb-3">
            <button pButton 
                    icon="pi pi-arrow-left" 
                    label="Regresar"
                    class="p-button-text"
                    routerLink="/landing">
            </button>
        </div>

        <form class="flex flex-col gap-3" (submit)="$event.preventDefault()">

            <span class="p-float-label">
                <label for="email">Correo</label>
                <input pInputText type="email" id="email"
                       (input)="email.set($any($event.target).value)" />
            </span>

            <span class="p-float-label">
                <label for="password">Contraseña</label>
                <input pPassword id="password" toggleMask="true"
                       (input)="password.set($any($event.target).value)" />
            </span>

            <button pButton label="Ingresar"
                    class="mt-2"
                    (click)="login()"></button>

            <div class="text-center mt-3">
                <a routerLink="/register" class="text-blue-500">Crear cuenta</a>
            </div>

        </form>

    </p-card>

</div>
