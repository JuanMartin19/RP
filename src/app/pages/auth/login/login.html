<div class="login-layout">
  
  <p-card styleClass="login-card shadow-8">

    <ng-template pTemplate="header">
      <div class="card-header flex flex-column align-items-center">
        <div class="logo-circle">
          <i class="pi pi-ticket text-4xl"></i>
        </div>
        <h1 class="title mt-3">Iniciar Sesión</h1>
        <p class="subtitle">Bienvenido de vuelta al ERP</p>
      </div>
    </ng-template>

    <form [formGroup]="loginForm" class="flex flex-column gap-4 pt-2" (ngSubmit)="login()">

      <p-message *ngIf="mensaje" [severity]="tipoMensaje || 'info'" [text]="mensaje" styleClass="w-full" />

      <div class="flex flex-column gap-1">
        <p-floatLabel variant="on">
          <input pInputText id="email" class="w-full custom-input" formControlName="email" autocomplete="email" />
          <label for="email">Correo electrónico</label>
        </p-floatLabel>
        <small class="error-text" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Ingresa un correo válido.
        </small>
      </div>

      <div class="flex flex-column gap-1">
        <p-floatLabel variant="on">
          <p-password id="password" styleClass="w-full" inputStyleClass="w-full custom-input"
                      [toggleMask]="true" [feedback]="false" formControlName="password" />
          <label for="password">Contraseña</label>
        </p-floatLabel>
        <small class="error-text" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          La contraseña es obligatoria.
        </small>
      </div>

      <div class="mt-4 flex flex-column align-items-center gap-3">
        <p-button label="Ingresar" icon="pi pi-sign-in" styleClass="submit-btn" 
                  [loading]="cargando" (click)="login()" />

        <p class="register-link">
          ¿No tienes cuenta? <a routerLink="/register">Regístrate aquí</a>
        </p>
      </div>

    </form>
  </p-card>
</div>
