<div class="flex justify-content-center align-items-center min-h-screen bg-surface-950 p-4">
  <p-card styleClass="w-full max-w-25rem">

    <ng-template pTemplate="header">
      <div class="p-4 pb-0 flex flex-column align-items-center">
        <!-- Logo con easter egg — 5 clicks muestra "catch u" -->
        <div class="cursor-pointer select-none mb-2" (click)="onLogoClick()">
          <i class="pi pi-ticket text-6xl text-primary"></i>
        </div>
        <h1 class="text-2xl font-bold mt-2 mb-0">Iniciar Sesión</h1>
      </div>
    </ng-template>

    <form [formGroup]="loginForm" class="flex flex-column gap-4 pt-3"
          (submit)="$event.preventDefault()" (keyup.enter)="login()">

      <!-- Email -->
      <div class="flex flex-column gap-1">
        <p-floatLabel variant="on">
          <input pInputText id="email" class="w-full" formControlName="email"
                 autocomplete="email" />
          <label for="email">Correo electrónico</label>
        </p-floatLabel>
        <small class="text-red-400"
          *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Ingresa un correo válido.
        </small>
      </div>

      <!-- Password -->
      <div class="flex flex-column gap-1">
        <p-floatLabel variant="on">
          <p-password id="password" styleClass="w-full" inputStyleClass="w-full"
                      [toggleMask]="true" [feedback]="false" formControlName="password" />
          <label for="password">Contraseña</label>
        </p-floatLabel>
        <small class="text-red-400"
          *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          La contraseña es obligatoria.
        </small>
      </div>

      <!-- Botón -->
      <p-button label="Ingresar" severity="primary" class="w-full"
                [loading]="cargando" (click)="login()" />

      <!-- Mensaje -->
      <p-message *ngIf="mensaje" [severity]="tipoMensaje || 'info'"
                 [text]="mensaje" class="mt-2" />

      <div class="text-center mt-2">
        <a routerLink="/register"
           class="text-primary no-underline font-medium hover:underline">
          Crear cuenta
        </a>
      </div>

    </form>
  </p-card>
</div>
