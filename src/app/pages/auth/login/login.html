<div class="flex justify-content-center align-items-center min-h-screen bg-surface-950 p-4">
    <p-card styleClass="w-full max-w-25rem">
        
        <ng-template pTemplate="header">
            <div class="p-4 pb-0">
                <p-button icon="pi pi-arrow-left" label="Regresar" severity="secondary" 
                          variant="text" routerLink="/landing" />
                <h2 class="text-2xl font-bold mt-3 text-surface-0">Iniciar Sesión</h2>
            </div>
        </ng-template>

        <form [formGroup]="loginForm" class="flex flex-column gap-4 pt-3" (submit)="$event.preventDefault()">

            <p-floatLabel variant="on">
                <input pInputText id="email" class="w-full" formControlName="email" />
                <label for="email">Correo</label>
            </p-floatLabel>

            <p-floatLabel variant="on">
                <p-password id="password" styleClass="w-full" inputStyleClass="w-full" 
                            [toggleMask]="true" [feedback]="false" formControlName="password">
                </p-password>
                <label for="password">Contraseña</label>
            </p-floatLabel>

            <p-button label="Ingresar" severity="primary" class="w-full" (click)="login()" />

            <div class="text-center mt-2">
                <a routerLink="/register" class="text-primary no-underline font-medium hover:underline">Crear cuenta</a>
            </div>

        </form>
    </p-card>
</div>
