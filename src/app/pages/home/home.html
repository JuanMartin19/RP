<div class="home-container">

  <div class="welcome">
    <h1>Bienvenido</h1>
    <p>Panel principal del sistema</p>
  </div>

  <div class="grid">

    <!-- Card 1 -->
    <p-card class="home-card">
      <div class="card-content">
        <i class="pi pi-users card-icon"></i>
        <h3>Usuarios</h3>
        <p>Gestiona los usuarios del sistema</p>
        <button pButton label="Ir" icon="pi pi-arrow-right" class="w-full"></button>
      </div>
    </p-card>

    <!-- Card 2 -->
    <p-card class="home-card">
      <div class="card-content">
        <i class="pi pi-shopping-cart card-icon"></i>
        <h3>Productos</h3>
        <p>Administra productos y stock</p>
        <button pButton label="Ir" icon="pi pi-arrow-right" class="w-full p-button-success"></button>
      </div>
    </p-card>

    <!-- Card 3 -->
    <p-card class="home-card">
      <div class="card-content">
        <i class="pi pi-chart-line card-icon"></i>
        <h3>Reportes</h3>
        <p>Visualiza estadísticas y ventas</p>
        <button pButton label="Ver" icon="pi pi-arrow-right" class="w-full p-button-warning"></button>
      </div>
    </p-card>

    <!-- Card 4 -->
    <p-card class="home-card">
      <div class="card-content">
        <i class="pi pi-cog card-icon"></i>
        <h3>Configuración</h3>
        <p>Ajustes del sistema</p>
        <button pButton label="Configurar" icon="pi pi-arrow-right" class="w-full p-button-secondary"></button>
      </div>
    </p-card>

  </div>

</div>
