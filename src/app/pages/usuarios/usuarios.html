<div class="p-4 w-full">
  <p-toast />
  <p-confirmDialog />
  
  <div class="mb-4">
    <h1 class="m-0 text-2xl font-bold text-white">Gestión de Usuarios</h1>
    <p class="text-surface-400">Control maestro de acceso y seguridad</p>
  </div>

  <p-table [value]="usuarios" styleClass="custom-table" [loading]="cargando">
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th>Usuario</th>
        <th>Último acceso</th>
        <th style="width: 150px">Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-u>
      <tr>
        <td class="text-white font-bold">{{ u.nombre_completo }}</td>
        <td class="text-blue-400">@{{ u.username }}</td>
        <td class="text-sm text-surface-400">{{ getLastLogin(u.last_login) }}</td>
        <td>
          <div class="flex gap-2">
            <p-button *ngIf="canOpenShield" icon="pi pi-shield" [text]="true" 
                      severity="warn" pTooltip="Permisos" (onClick)="abrirPermisos(u)" />
            
            <p-button *ngIf="canEdit" icon="pi pi-pencil" [text]="true" 
                      pTooltip="Editar" (onClick)="editarUsuario(u)" />

            <p-button *ngIf="canDelete" icon="pi pi-trash" [text]="true" 
                      severity="danger" pTooltip="Eliminar" (onClick)="confirmarEliminar(u)" />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <p-dialog [(visible)]="permisosDialog" [header]="'Seguridad: ' + usuarioSeleccionado?.nombre_completo" [modal]="true" [style]="{ width: '850px' }">
    
    <div class="flex gap-4 mb-4 bg-gray-900 p-3 border-round border-1 border-gray-700" *ngIf="canManageGlobalPerms">
      <div class="flex align-items-center">
        <p-radioButton name="tipo" value="global" [(ngModel)]="tipoGestion" inputId="t1" (onClick)="cargarPermisosActuales()" />
        <label for="t1" class="ml-2 cursor-pointer font-bold text-blue-400">Permisos Globales</label>
      </div>
      
      <div class="flex align-items-center">
        <p-radioButton name="tipo" value="grupo" [(ngModel)]="tipoGestion" inputId="t2" (onClick)="cargarPermisosActuales()" />
        <label for="t2" class="ml-2 cursor-pointer font-bold text-green-400">Permisos por Grupo</label>
      </div>
    </div>

    <div class="mb-3 text-green-400 font-italic text-sm" *ngIf="!canManageGlobalPerms">
      <i class="pi pi-info-circle"></i> Gestionando permisos específicos para los grupos de trabajo.
    </div>

    <div class="mb-4" *ngIf="tipoGestion === 'grupo'">
      <p-select [options]="gruposDelUsuario" [(ngModel)]="grupoSeleccionado" optionLabel="nombre" 
                placeholder="Selecciona un grupo..." class="w-full" (onChange)="cargarPermisosActuales()" appendTo="body" />
    </div>

    <div class="mt-4" *ngIf="tipoGestion === 'global' || (tipoGestion === 'grupo' && grupoSeleccionado)">
      <p-pickList [source]="permisosDisponibles" [target]="permisosAsignados" 
                  [dragdrop]="true" [responsive]="true" [showSourceControls]="false" [showTargetControls]="false"
                  (onMoveToTarget)="onMoveToTarget($event)" (onMoveToSource)="onMoveToSource($event)">
        <ng-template let-p pTemplate="item">
          <div class="flex align-items-center gap-2">
            <i class="pi pi-key text-xs opacity-50"></i>
            <span>{{ p }}</span>
          </div>
        </ng-template>
      </p-pickList>
    </div>
  </p-dialog>

  <p-dialog [(visible)]="visible" header="Editar Datos de Usuario" [modal]="true" [style]="{ width: '450px' }">
    <form [formGroup]="usuarioForm" class="flex flex-column gap-3 mt-3">
      <div class="flex flex-column gap-1">
        <label class="text-xs font-bold text-surface-400 uppercase">Nombre Completo</label>
        <input pInputText formControlName="nombre_completo" />
      </div>
      <div class="flex flex-column gap-1">
        <label class="text-xs font-bold text-surface-400 uppercase">Username</label>
        <input pInputText formControlName="username" />
      </div>
      <div class="flex flex-column gap-1">
        <label class="text-xs font-bold text-surface-400 uppercase">Dirección</label>
        <input pInputText formControlName="direccion" />
      </div>
      <div class="flex flex-column gap-1">
        <label class="text-xs font-bold text-surface-400 uppercase">Teléfono</label>
        <input pInputText formControlName="telefono" />
      </div>
      
      <div class="flex justify-content-end gap-2 mt-2">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="visible = false" />
        <p-button label="Guardar Cambios" icon="pi pi-save" [loading]="guardando" (onClick)="guardarUsuario()" />
      </div>
    </form>
  </p-dialog>
</div>
