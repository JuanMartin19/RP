<div class="p-5 flex flex-column gap-4">

    <p-card>
        <div class="flex justify-content-between align-items-center">
            <div>
                <span class="text-500">Total de Usuarios</span>
                <div class="text-4xl font-bold text-primary">
                    {{ groups.length }}
                </div>
            </div>
            <i class="pi pi-users text-4xl text-primary"></i>
        </div>
    </p-card>

    <br>

    <p-card>

        <div class="flex justify-content-between align-items-center mb-3">
            <h2 class="m-0">Gestión de Grupos</h2>
            <p-button 
                label="Nuevo Grupo" 
                icon="pi pi-plus" 
                (click)="openNew()" />
        </div>

        <p-table 
            [value]="groups" 
            responsiveLayout="scroll"
            [paginator]="true"
            [rows]="5">

            <ng-template pTemplate="header">
                <tr>
                    <th>Nombre</th>
                    <th>Nivel</th>
                    <th>Autor</th>
                    <th>Integrantes</th>
                    <th>Tickets</th>
                    <th style="width: 120px">Acciones</th>
                </tr>
            </ng-template>

            <ng-template pTemplate="body" let-group>
                <tr>
                    <td>{{ group.nombre }}</td>
                    <td>{{ group.nivel }}</td>
                    <td>{{ group.autor }}</td>
                    <td>{{ group.integrantes }}</td>
                    <td>{{ group.tickets }}</td>
                    <td>
                        <div class="flex gap-2">
                            <p-button 
                                icon="pi pi-pencil" 
                                [text]="true"
                                (click)="editGroup(group)" />

                            <p-button 
                                icon="pi pi-trash" 
                                severity="danger"
                                [text]="true"
                                (click)="deleteGroup(group.id!)" />
                        </div>
                    </td>
                </tr>
            </ng-template>

            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="6" class="text-center">
                        No hay grupos registrados
                    </td>
                </tr>
            </ng-template>

        </p-table>

    </p-card>

    <p-dialog 
        [(visible)]="groupDialog"
        [header]="editingId ? 'Editar Grupo' : 'Nuevo Grupo'"
        [modal]="true"
        [style]="{ width: '30rem' }"
        [draggable]="false"
        [resizable]="false">

        <form 
            [formGroup]="groupForm"
            class="p-fluid flex flex-column gap-3">

            <input 
                pInputText 
                formControlName="nombre"
                placeholder="Nombre del grupo" />

            <input 
                pInputText 
                formControlName="nivel"
                placeholder="Nivel" />

            <input 
                pInputText 
                formControlName="autor"
                placeholder="Autor" />

            <p-inputNumber 
                formControlName="integrantes"
                placeholder="Integrantes" />

            <p-inputNumber 
                formControlName="tickets"
                placeholder="Tickets" />

            <textarea 
                pInputTextarea 
                formControlName="descripcion"
                rows="3"
                placeholder="Descripción">
            </textarea>

            <div class="flex justify-content-end gap-2 mt-2">
                <p-button 
                    label="Cancelar"
                    severity="secondary"
                    [outlined]="true"
                    (click)="groupDialog=false" />

                <p-button 
                    label="Guardar"
                    icon="pi pi-save"
                    (click)="saveGroup()" />
            </div>

        </form>
    </p-dialog>

</div>
