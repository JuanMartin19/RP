<div class="groups-container">

  <div class="stat-wrapper">
    <div class="stat-card">
      <div class="stat-number">{{ groups.length }}</div>
      <div class="stat-label">Total de Grupos</div>
    </div>
  </div>

  <div class="table-container">
    <p-toolbar styleClass="custom-toolbar">
      <div class="p-toolbar-group-start gap-3">
        <p-button *ngIf="canAdd" label="New" icon="pi pi-plus" styleClass="custom-blue-btn" (onClick)="openNew()"></p-button>
        <p-button *ngIf="canDelete" label="Delete" icon="pi pi-trash" styleClass="custom-danger-outline-btn" [disabled]="!selectedGroups.length" (onClick)="deleteSelectedGroups()"></p-button>
      </div>
      <div class="p-toolbar-group-end gap-3">
        <p-button label="Import" icon="pi pi-plus" styleClass="custom-blue-btn" [outlined]="true"></p-button>
        <p-button label="Export" icon="pi pi-upload" severity="secondary" styleClass="custom-secondary-outline-btn" [outlined]="true"></p-button>
      </div>
    </p-toolbar>

    <p-table 
      #dt 
      [value]="groups"
      [(selection)]="selectedGroups"
      dataKey="id"
      [paginator]="true"
      [rows]="5"
      [globalFilterFields]="['nombre', 'autor', 'descripcion']"
      styleClass="custom-table"
      [rowHover]="true">

      <ng-template pTemplate="caption">
        <div class="table-header-flex">
          <h3 class="table-title">Gestión de Grupos</h3>
          <span class="search-wrapper">
            <i class="pi pi-search"></i>
            <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')" placeholder="Buscar..." />
          </span>
        </div>
      </ng-template>

      <ng-template pTemplate="header">
        <tr>
          <th style="width: 4rem"><p-tableHeaderCheckbox></p-tableHeaderCheckbox></th>
          <th pSortableColumn="autor">Autor <p-sortIcon field="autor"></p-sortIcon></th>
          <th pSortableColumn="nombre">Nombre <p-sortIcon field="nombre"></p-sortIcon></th>
          <th pSortableColumn="integrantes">Integrantes <p-sortIcon field="integrantes"></p-sortIcon></th>
          <th pSortableColumn="tickets">Tickets <p-sortIcon field="tickets"></p-sortIcon></th>
          <th pSortableColumn="descripcion">Descripción <p-sortIcon field="descripcion"></p-sortIcon></th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-group>
        <tr (click)="editGroup(group)" style="cursor: pointer;">
          <td><p-tableCheckbox [value]="group" (click)="$event.stopPropagation()"></p-tableCheckbox></td>
          <td>{{ group.autor }}</td>
          <td class="font-bold text-white">{{ group.nombre }}</td>
          <td>{{ group.integrantes }}</td>
          <td>{{ group.tickets }}</td>
          <td class="text-gray-400">{{ group.descripcion }}</td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="6" class="text-center p-4 text-gray-400">No hay grupos registrados</td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <p-dialog 
    [(visible)]="groupDialog"
    [header]="editingId ? 'Editar Grupo' : 'Nuevo Grupo'"
    [modal]="true"
    [style]="{ width: '400px' }"
    [draggable]="false"
    [resizable]="false"
    styleClass="custom-dialog">

    <form [formGroup]="groupForm" class="flex flex-column gap-3 mt-3">
      <div class="field-group">
        <label class="block mb-1 text-sm text-gray-400">Nombre del grupo</label>
        <input pInputText formControlName="nombre" class="w-full custom-input" />
      </div>

      <div class="field-group">
        <label class="block mb-1 text-sm text-gray-400">Autor</label>
        <input pInputText formControlName="autor" class="w-full custom-input" />
      </div>

      <div class="flex gap-3">
        <div class="flex-1">
          <label class="block mb-1 text-sm text-gray-400">Integrantes</label>
          <p-inputNumber formControlName="integrantes" class="w-full"></p-inputNumber>
        </div>
        <div class="flex-1">
          <label class="block mb-1 text-sm text-gray-400">Tickets</label>
          <p-inputNumber formControlName="tickets" class="w-full"></p-inputNumber>
        </div>
      </div>

      <div class="field-group">
        <label class="block mb-1 text-sm text-gray-400">Descripción</label>
        <textarea pInputTextarea rows="3" formControlName="descripcion" class="w-full custom-input"></textarea>
      </div>

      <div class="flex justify-content-end gap-2 mt-4">
        <p-button label="Cancelar" severity="secondary" [outlined]="true" (onClick)="groupDialog=false"></p-button>
        <p-button label="Guardar" icon="pi pi-check" severity="success" (onClick)="saveGroup()"></p-button>
      </div>
    </form>
  </p-dialog>

</div>
