<div class="flex flex-column align-items-center justify-content-center min-h-screen gap-4 p-4">

    <div class="flex flex-column gap-4 w-full" style="max-width: 35rem;">
        
        <p-card styleClass="shadow-2 w-full">
            <div class="text-center">
                <h2 class="text-4xl font-bold m-0" style="color: #38bdf8;">N</h2>
                <p class="text-secondary m-0">Total de Usuarios</p>
            </div>
        </p-card>

        <p-card styleClass="w-full">

            <ng-template #subtitle> Card subtitle </ng-template>
            <p>
                Lorem ipsum dolor sit amet, consectetur adipisicing elit. Inventore sed consequuntur error repudiandae

            <ng-template #footer>

                    <p-button label="Cancel" severity="secondary" class="w-full" [outlined]="true" />
