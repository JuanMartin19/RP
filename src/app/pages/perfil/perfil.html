<div class="perfil-layout">

  <div class="perfil-form-container">
    
    <div class="perfil-header">
      <h2>Mis datos</h2>
      <p>Gestiona tu información personal</p>
    </div>

    <form [formGroup]="perfilForm" class="form-content">

      <div class="input-group">
        <span class="icon"><i class="pi pi-user"></i></span>
        <input pInputText formControlName="usuario" placeholder="Usuario" />
      </div>

      <div class="input-group">
        <span class="icon"><i class="pi pi-envelope"></i></span>
        <input pInputText formControlName="email" placeholder="Correo" />
      </div>

      <div class="input-group">
        <span class="icon"><i class="pi pi-lock"></i></span>
        <p-password formControlName="password" [toggleMask]="true" [feedback]="false" placeholder="Password"></p-password>
      </div>

      <div class="input-group">
        <span class="icon"><i class="pi pi-lock"></i></span>
        <p-password formControlName="confirmPassword" [toggleMask]="true" [feedback]="false" placeholder="Confirmar contraseña"></p-password>
      </div>

      <div class="input-group">
        <span class="icon"><i class="pi pi-user"></i></span>
        <input pInputText formControlName="nombre" placeholder="Nombre" />
      </div>

      <div class="input-group">
        <span class="icon"><i class="pi pi-map-marker"></i></span>
        <input pInputText formControlName="direccion" placeholder="Dirección" />
      </div>

      <div class="input-group">
        <span class="icon"><i class="pi pi-phone"></i></span>
        <input pInputText formControlName="telefono" maxlength="10" (input)="limitarTelefono($event)" placeholder="Teléfono" />
      </div>

      <div class="extra-fields">
        <div class="birth-date">
          <label>Fecha de nacimiento</label>
          <p-datepicker formControlName="nacimiento" [showIcon]="true" appendTo="body"></p-datepicker>
        </div>
      </div>

      <div class="actions mt-4">
        <button pButton label="Guardar cambios" icon="pi pi-save" severity="success" class="w-full" (click)="guardarCambios()"></button>
        <p-message *ngIf="mensaje" [severity]="tipoMensaje || 'info'" [text]="mensaje" class="mt-2 block w-full"></p-message>
      </div>

    </form>
  </div>


  <div class="perfil-dashboard">
    
    <div class="stats-row">
      <div class="stat-card" *ngFor="let stat of stats" [ngClass]="stat.class">
        <span class="stat-title">{{ stat.titulo }}</span>
        <span class="stat-value">{{ stat.valor }}</span>
      </div>
    </div>

    <div class="tickets-table-container">
      <div class="table-header-title">
        <i class="pi pi-list"></i> Mis Tickets Asignados
      </div>
      
      <p-table [value]="misTickets" styleClass="custom-table dark-table">
        <ng-template pTemplate="header">
          <tr>
            <th>ID</th>
            <th>Titulo</th>
            <th>Prioridad</th>
            <th>Estado</th>
          </tr>
        </ng-template>
        <ng-template pTemplate="body" let-ticket>
          <tr>
            <td class="text-blue">{{ ticket.id }}</td>
            <td>{{ ticket.titulo }}</td>
            <td>
              <span class="ticket-prio" [ngClass]="getPrioridadClass(ticket.prioridad)">
                {{ ticket.prioridad }}
              </span>
            </td>
            <td>
              <p-tag [value]="ticket.estado" [severity]="getEstadoSeverity(ticket.estado)"></p-tag>
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>

  </div>

</div>
