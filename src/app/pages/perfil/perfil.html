<div class="flex justify-content-center p-4">
    <p-card styleClass="w-full max-w-28rem surface-card shadow-4 border-round-xl p-4">
        
        <div class="mb-5">
            <h1 class="text-2xl font-bold m-0 text-surface-0">Mis datos</h1>
            <p class="text-surface-400 m-0 mt-1 text-sm">Ingresa tu información personal</p>
        </div>

        <form [formGroup]="perfilForm" class="p-fluid flex flex-column gap-4">
            
            <p-floatLabel variant="on">
                <input pInputText id="usuario" class="w-full" formControlName="usuario" />
                <label for="usuario">Usuario</label>
            </p-floatLabel>

            <p-floatLabel variant="on">
                <input pInputText id="email" class="w-full" formControlName="email" />
                <label for="email">Correo</label>
            </p-floatLabel>

            <p-floatLabel variant="on">
                <p-password id="password" [toggleMask]="true" [feedback]="false" 
                            formControlName="password" styleClass="w-full" inputStyleClass="w-full">
                </p-password>
                <label for="password">Password</label>
            </p-floatLabel>

            <p-floatLabel variant="on">
                <p-password id="confirmPassword" [toggleMask]="true" [feedback]="false" 
                            formControlName="confirmPassword" styleClass="w-full" inputStyleClass="w-full">
                </p-password>
                <label for="confirmPassword">Confirmar</label>
            </p-floatLabel>

            <div class="mt-4">
                <p-button label="Guardar cambios" icon="pi pi-save" severity="success" 
                          styleClass="w-full" (click)="registrar()" />
            </div>

            <p-message *ngIf="mensaje" [severity]="tipoMensaje || 'info'" [text]="mensaje" />
        </form>
    </p-card>
</div>
